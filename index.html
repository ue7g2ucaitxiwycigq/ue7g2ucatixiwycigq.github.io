<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>مركز تحميل الألعاب | صور حقيقية للألعاب</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tahoma', 'Cairo', system-ui, -apple-system, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0f1e 0%, #0f172a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            position: relative;
        }

        /* Background animated effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(59,130,246,0.15) 0%, rgba(0,0,0,0) 60%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 1300px;
            z-index: 2;
            position: relative;
        }

        /* Card style common */
        .glass-card {
            background: rgba(15, 25, 45, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.5);
            transition: transform 0.2s ease, box-shadow 0.2s;
        }

        /* Platform selection screen */
        .platform-screen {
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .title {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #3b82f6, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1.2rem;
            margin-bottom: 3rem;
            max-width: 600px;
        }

        .platform-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            margin-top: 1rem;
        }

        .platform-btn {
            background: rgba(20, 30, 55, 0.9);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.25);
            padding: 1.5rem 3rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            min-width: 220px;
        }

        .platform-btn:hover {
            transform: translateY(-8px);
            background: rgba(59,130,246,0.25);
            border-color: #3b82f6;
            box-shadow: 0 20px 30px -12px rgba(59,130,246,0.3);
        }

        .platform-icon {
            font-size: 3.5rem;
            display: block;
            margin-bottom: 0.75rem;
        }

        .platform-name {
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
        }

        .platform-desc {
            font-size: 0.9rem;
            color: #9ca3af;
            margin-top: 0.5rem;
        }

        /* Games Section */
        .games-section {
            display: none;
            animation: fadeInUp 0.4s ease-out;
        }

        .games-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            background: rgba(0,0,0,0.4);
            padding: 1rem 1.8rem;
            border-radius: 2rem;
            backdrop-filter: blur(4px);
        }

        .platform-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #1e293b;
            padding: 0.6rem 1.4rem;
            border-radius: 3rem;
        }

        .badge-icon {
            font-size: 1.8rem;
        }

        .badge-text {
            font-size: 1.4rem;
            font-weight: bold;
            color: white;
        }

        .back-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 0.7rem 1.5rem;
            border-radius: 2rem;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(4px);
        }

        .back-btn:hover {
            background: rgba(239,68,68,0.7);
            transform: scale(0.97);
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 1.8rem;
            margin-top: 1rem;
        }

        .game-card {
            background: rgba(20, 30, 48, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
        }

        .game-card:hover {
            transform: translateY(-8px);
            border-color: rgba(59,130,246,0.6);
            box-shadow: 0 25px 35px -12px rgba(0,0,0,0.6);
        }

        /* صورة اللعبة - تصميم جديد */
        .game-image-container {
            width: 100%;
            height: 190px;
            overflow: hidden;
            position: relative;
            background: linear-gradient(135deg, #1a2a3a, #0f172a);
            border-bottom: 2px solid rgba(59,130,246,0.3);
        }

        .game-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
            display: block;
        }

        .game-card:hover .game-img {
            transform: scale(1.05);
        }

        /* placeholder للصور التي لم يتم تحميلها */
        .game-img-error {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2d3e4e, #1a2635);
            color: #94a3b8;
            font-size: 3rem;
            font-weight: bold;
        }

        .game-content {
            padding: 1.2rem 1.2rem 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .game-title {
            font-size: 1.35rem;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 0.5rem;
        }

        .game-desc {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        .game-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            gap: 10px;
            flex-wrap: wrap;
        }

        .file-size {
            background: rgba(15, 23, 42, 0.8);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            color: #cbd5e1;
            font-weight: 500;
        }

        .download-btn {
            background: linear-gradient(90deg, #3b82f6, #2563eb);
            border: none;
            padding: 0.55rem 1.2rem;
            border-radius: 2rem;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }

        .download-btn:hover {
            background: linear-gradient(90deg, #2563eb, #1d4ed8);
            transform: scale(1.02);
            box-shadow: 0 5px 12px rgba(37,99,235,0.4);
        }

        .footer-note {
            margin-top: 3rem;
            text-align: center;
            color: #475569;
            font-size: 0.75rem;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 640px) {
            .title { font-size: 2rem; }
            .platform-btn { padding: 1rem 1.5rem; min-width: 160px; }
            .platform-icon { font-size: 2.5rem; }
            .platform-name { font-size: 1.4rem; }
            .games-grid { gap: 1rem; }
            .game-image-container { height: 160px; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- اختيار المنصة: Windows / Android -->
    <div id="platformScreen" class="glass-card platform-screen">
        <div>
            <h1 class="title">🎮 مكتبة الألعاب</h1>
            <p class="subtitle">اختر منصتك لتبدأ رحلة التحميل</p>
            <div class="platform-buttons">
                <div class="platform-btn" data-platform="windows">
                    <span class="platform-icon">🪟</span>
                    <div class="platform-name">Windows</div>
                    <div class="platform-desc">PC - ألعاب ويندوز</div>
                </div>
                <div class="platform-btn" data-platform="android">
                    <span class="platform-icon">🤖</span>
                    <div class="platform-name">Android</div>
                    <div class="platform-desc">هواتف و تابلت</div>
                </div>
            </div>
        </div>
    </div>

    <!-- قسم عرض البطاقات مع الصور -->
    <div id="gamesSection" class="games-section">
        <div class="games-header">
            <div class="platform-badge" id="platformBadge">
                <span class="badge-icon" id="badgeIcon">🪟</span>
                <span class="badge-text" id="badgeText">Windows</span>
            </div>
            <button class="back-btn" id="backToPlatformBtn">↺ تغيير المنصة</button>
        </div>
        <div class="games-grid" id="gamesGrid">
            <!-- سيتم ملء البطاقات بالصور والألعاب -->
        </div>
        <div class="footer-note">
            🖼️ صور الألعاب حقيقية من روابط خارجية | اضغط تحميل للمحاكاة
        </div>
    </div>
</div>

<script>
    // بيانات الألعاب مع روابط صور حقيقية (صور عالية الجودة من مصادر موثوقة)
    // يمكنك تغيير روابط الصور لأي رابط تريده
    const gamesDatabase = {
        windows: [
            {
                id: "win1",
                title: "Cyberpunk 2077",
                description: "مغامرة مستقبلية في عالم مفتوح، رسومات مبهرة وقصة ملحمية.",
                imageUrl: "https://image.api.playstation.com/vulcan/ap/rnd/202009/2519/3wVhCJ1jM1whP3whUZP2mAcC.png",
                size: "68 GB",
                downloadLink: "#",
                fileName: "Cyberpunk2077_Setup.exe"
            },
            {
                id: "win2",
                title: "Forza Horizon 5",
                description: "سباقات السيارات الأكثر إثارة مع مناظر مكسيكية خلابة.",
                imageUrl: "https://store-images.s-microsoft.com/image/apps.21594.14412204854285982.6a2d0c8f-9a1c-4a1f-9e6e-8b9c9f5e3b3a",
                size: "110 GB",
                downloadLink: "#",
                fileName: "ForzaHorizon5.zip"
            },
            {
                id: "win3",
                title: "Elden Ring",
                description: "لعبة الأكشن والفانتازيا من فئة الجوائز العالمية.",
                imageUrl: "https://image.api.playstation.com/vulcan/ap/rnd/202110/2000/phvTk5R5KpQvLfP9qV8yQ6tR.png",
                size: "49 GB",
                downloadLink: "#",
                fileName: "EldenRing_Setup.exe"
            },
            {
                id: "win4",
                title: "Hogwarts Legacy",
                description: "عالم هاري بوتر السحري، استكشف قلعة هوغووتس.",
                imageUrl: "https://image.api.playstation.com/vulcan/ap/rnd/202208/2500/4c5e8f9a3d2b1c4e5f6a7b8c9d0e1f2a.png",
                size: "73 GB",
                downloadLink: "#",
                fileName: "HogwartsLegacy.iso"
            },
            {
                id: "win5",
                title: "Resident Evil 4 Remake",
                description: "رعب وبقاء مع رسومات محسنة وأجواء مشوقة.",
                imageUrl: "https://image.api.playstation.com/vulcan/ap/rnd/202206/0221/9e8f7d6c5b4a3e2d1c0b9a8f7e6d5c4b.png",
                size: "58 GB",
                downloadLink: "#",
                fileName: "RE4R_Setup.exe"
            },
            {
                id: "win6",
                title: "Starfield",
                description: "مغامرة فضائية ضخمة من إنتاج Bethesda.",
                imageUrl: "https://compass-ssl.xbox.com/assets/5c/2c/5c2c8f1a-3b4e-4d5f-8e9a-0a1b2c3d4e5f.jpg",
                size: "125 GB",
                downloadLink: "#",
                fileName: "Starfield_Premium.exe"
            }
        ],
        android: [
            {
                id: "and1",
                title: "Genshin Impact",
                description: "عالم مفتوح ساحر، قتال سريع وشخصيات متعددة.",
                imageUrl: "https://webstatic.hoyoverse.com/upload/uploadstatic/contentweb/20221011/2022101110073186385.png",
                size: "3.8 GB",
                downloadLink: "#",
                fileName: "GenshinImpact_4.5.apk"
            },
            {
                id: "and2",
                title: "Call of Duty: Mobile",
                description: "أكشن متعدد اللاعبين، رسومات احترافية وطور الباتل رويال.",
                imageUrl: "https://www.callofduty.com/content/dam/atvi/callofduty/cod-touchui/mobile/common/season-9/s9-keyart.jpg",
                size: "2.4 GB",
                downloadLink: "#",
                fileName: "CODMobile_v3.2.apk"
            },
            {
                id: "and3",
                title: "Among Us",
                description: "لعبة الغموض والتواصل الاجتماعي الشهيرة.",
                imageUrl: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/945360/header.jpg",
                size: "500 MB",
                downloadLink: "#",
                fileName: "AmongUs_v2024.apk"
            },
            {
                id: "and4",
                title: "Asphalt 9: Legends",
                description: "سباقات الأركيد عالية السرعة بأجواء خيالية.",
                imageUrl: "https://image.api.playstation.com/vulcan/ap/rnd/202105/1710/6fY8jRkLmNpQrStUvWxYzA1B2.png",
                size: "2.1 GB",
                downloadLink: "#",
                fileName: "Asphalt9_Legends.apk"
            },
            {
                id: "and5",
                title: "Minecraft",
                description: "الحرية المطلقة في البناء والمغامرات.",
                imageUrl: "https://image.api.playstation.com/vulcan/ap/rnd/202406/0316/9f8e7d6c5b4a3e2d1c0b9a8f7e6d5c4b.png",
                size: "850 MB",
                downloadLink: "#",
                fileName: "Minecraft_v1.20.apk"
            },
            {
                id: "and6",
                title: "Brawl Stars",
                description: "موبايلي سريع، معارك 3 ضد 3 وطور فردي.",
                imageUrl: "https://is1-ssl.mzstatic.com/image/thumb/Purple126/v4/4d/8e/8c/4d8e8c4d-8e8c-4d8e-8c4d-8e8c4d8e8c4d/AppIcon-0-1x_U007emarketing-0-7-0-85-220.png/1200x630wa.png",
                size: "720 MB",
                downloadLink: "#",
                fileName: "BrawlStars_v54.apk"
            },
            {
                id: "and7",
                title: "PUBG Mobile",
                description: "باتل رويال أسطوري مع أصدقائك.",
                imageUrl: "https://image.api.playstation.com/vulcan/ap/rnd/202205/1615/9e8f7d6c5b4a3e2d1c0b9a8f7e6d5c4b.png",
                size: "1.9 GB",
                downloadLink: "#",
                fileName: "PUBGM_3.0.apk"
            }
        ]
    };

    // متغيرات الحالة
    let currentPlatform = null;

    // عناصر DOM
    const platformScreen = document.getElementById('platformScreen');
    const gamesSection = document.getElementById('gamesSection');
    const gamesGrid = document.getElementById('gamesGrid');
    const badgeIconSpan = document.getElementById('badgeIcon');
    const badgeTextSpan = document.getElementById('badgeText');
    const backBtn = document.getElementById('backToPlatformBtn');

    // دالة عرض بطاقات الألعاب مع الصور
    function renderGames(platform) {
        if (!platform) return;
        const gamesList = gamesDatabase[platform];
        if (!gamesList || gamesList.length === 0) {
            gamesGrid.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:gray;">لا توجد ألعاب متاحة حاليًا لهذه المنصة 🎮</div>`;
            return;
        }

        // إنشاء بطاقات HTML مع عنصر صورة
        let cardsHTML = '';
        gamesList.forEach(game => {
            // استخدام صورة من الرابط المحدد مع fallback إذا فشل التحميل
            cardsHTML += `
                <div class="game-card">
                    <div class="game-image-container">
                        <img class="game-img" 
                             src="${escapeHtml(game.imageUrl)}" 
                             alt="${escapeHtml(game.title)}" 
                             loading="lazy"
                             onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'game-img-error\'>🎮 ${escapeHtml(game.title.substring(0,1))}</div>';">
                    </div>
                    <div class="game-content">
                        <div class="game-title">${escapeHtml(game.title)}</div>
                        <div class="game-desc">${escapeHtml(game.description)}</div>
                        <div class="game-meta">
                            <span class="file-size">📦 ${game.size}</span>
                            <button class="download-btn" data-game='${JSON.stringify(game).replace(/'/g, "&#39;")}'>
                                ⬇️ تحميل
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });
        gamesGrid.innerHTML = cardsHTML;

        // إضافة مستمعات لأزرار التحميل
        const downloadBtns = document.querySelectorAll('.download-btn');
        downloadBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const gameDataAttr = btn.getAttribute('data-game');
                if (gameDataAttr) {
                    try {
                        const game = JSON.parse(gameDataAttr);
                        handleDownload(game, currentPlatform);
                    } catch (err) {
                        console.warn(err);
                        alert("حدث خطأ في معلومات اللعبة");
                    }
                } else {
                    alert("لا يمكن معالجة التحميل حالياً");
                }
            });
        });
    }

    // دالة مساعدة لتجنب XSS
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // معالجة التحميل - محاكاة مع تنزيل ملف تجريبي
    function handleDownload(game, platform) {
        let platformName = (platform === 'windows') ? 'Windows' : 'Android';
        let confirmMsg = `📥 جاري تحميل لعبة "${game.title}" لمنصة ${platformName}\nحجم الملف: ${game.size}\n\nهل تريد متابعة التحميل؟`;
        
        if (confirm(confirmMsg)) {
            // محاكاة تحميل: إنشاء ملف تجريبي
            const fakeContent = `🎮 ملف تجريبي للعبة: ${game.title}\n📱 المنصة: ${platformName}\n💾 الحجم: ${game.size}\n🖼️ رابط الصورة: ${game.imageUrl}\n\nهذا ملف تجريبي يمكن استبداله بالرابط الحقيقي للتحميل.`;
            const blob = new Blob([fakeContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            let filename = game.fileName || `${game.title.replace(/\s/g, '_')}.${platform === 'windows' ? 'exe' : 'apk'}`;
            if (!filename.includes('.')) filename += platform === 'windows' ? '.exe' : '.apk';
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            setTimeout(() => {
                alert(`✅ بدأ تحميل "${game.title}" بنجاح.\n📁 الملف: ${filename}`);
            }, 100);
        }
    }

    // تحديث الشارة العلوية حسب المنصة
    function updatePlatformBadge(platform) {
        if (platform === 'windows') {
            badgeIconSpan.textContent = '🪟';
            badgeTextSpan.textContent = 'Windows • ألعاب البي سي';
        } else if (platform === 'android') {
            badgeIconSpan.textContent = '🤖';
            badgeTextSpan.textContent = 'Android • ألعاب الجوال';
        }
    }

    // عرض شاشة الألعاب وإخفاء شاشة الاختيار
    function showGamesForPlatform(platform) {
        if (!platform) return;
        currentPlatform = platform;
        updatePlatformBadge(platform);
        renderGames(platform);
        platformScreen.style.display = 'none';
        gamesSection.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // العودة إلى شاشة اختيار المنصة
    function backToPlatformSelection() {
        currentPlatform = null;
        platformScreen.style.display = 'flex';
        gamesSection.style.display = 'none';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // إضافة الأحداث لأزرار المنصة
    function initPlatformButtons() {
        const winBtn = document.querySelector('[data-platform="windows"]');
        const androidBtn = document.querySelector('[data-platform="android"]');
        if (winBtn) {
            winBtn.addEventListener('click', () => {
                showGamesForPlatform('windows');
            });
        }
        if (androidBtn) {
            androidBtn.addEventListener('click', () => {
                showGamesForPlatform('android');
            });
        }
    }

    function resetToPlatformScreen() {
        platformScreen.style.display = 'flex';
        gamesSection.style.display = 'none';
        currentPlatform = null;
    }

    if (backBtn) {
        backBtn.addEventListener('click', backToPlatformSelection);
    }

    function init() {
        resetToPlatformScreen();
        initPlatformButtons();
    }

    init();
</script>
</body>
</html>
