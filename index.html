<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>مركز تحميل الألعاب | إشعارات مع IP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tahoma', 'Cairo', system-ui, -apple-system, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0f1e 0%, #0f172a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(59,130,246,0.15) 0%, rgba(0,0,0,0) 60%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 1300px;
            z-index: 2;
            position: relative;
        }

        .glass-card {
            background: rgba(15, 25, 45, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.5);
        }

        .platform-screen {
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .title {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #3b82f6, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1.2rem;
            margin-bottom: 3rem;
            max-width: 600px;
        }

        .platform-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            margin-top: 1rem;
        }

        .platform-btn {
            background: rgba(20, 30, 55, 0.9);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.25);
            padding: 1.5rem 3rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            min-width: 220px;
        }

        .platform-btn:hover {
            transform: translateY(-8px);
            background: rgba(59,130,246,0.25);
            border-color: #3b82f6;
            box-shadow: 0 20px 30px -12px rgba(59,130,246,0.3);
        }

        .platform-icon {
            font-size: 3.5rem;
            display: block;
            margin-bottom: 0.75rem;
        }

        .platform-name {
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
        }

        .platform-desc {
            font-size: 0.9rem;
            color: #9ca3af;
            margin-top: 0.5rem;
        }

        .games-section {
            display: none;
            animation: fadeInUp 0.4s ease-out;
        }

        .games-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            background: rgba(0,0,0,0.4);
            padding: 1rem 1.8rem;
            border-radius: 2rem;
            backdrop-filter: blur(4px);
        }

        .platform-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #1e293b;
            padding: 0.6rem 1.4rem;
            border-radius: 3rem;
        }

        .badge-icon {
            font-size: 1.8rem;
        }

        .badge-text {
            font-size: 1.4rem;
            font-weight: bold;
            color: white;
        }

        .back-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 0.7rem 1.5rem;
            border-radius: 2rem;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: rgba(239,68,68,0.7);
            transform: scale(0.97);
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 1.8rem;
            margin-top: 1rem;
        }

        .game-card {
            background: rgba(20, 30, 48, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
        }

        .game-card:hover {
            transform: translateY(-8px);
            border-color: rgba(59,130,246,0.6);
            box-shadow: 0 25px 35px -12px rgba(0,0,0,0.6);
        }

        .game-image-container {
            width: 100%;
            height: 190px;
            overflow: hidden;
            position: relative;
            background: linear-gradient(135deg, #1a2a3a, #0f172a);
            border-bottom: 2px solid rgba(59,130,246,0.3);
        }

        .game-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
            display: block;
        }

        .game-card:hover .game-img {
            transform: scale(1.05);
        }

        .game-img-error {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2d3e4e, #1a2635);
            color: #94a3b8;
            font-size: 3rem;
        }

        .game-content {
            padding: 1.2rem 1.2rem 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .game-title {
            font-size: 1.35rem;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 0.5rem;
        }

        .game-desc {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        .game-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            gap: 10px;
            flex-wrap: wrap;
        }

        .file-size {
            background: rgba(15, 23, 42, 0.8);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            color: #cbd5e1;
        }

        .download-btn {
            background: linear-gradient(90deg, #3b82f6, #2563eb);
            border: none;
            padding: 0.55rem 1.2rem;
            border-radius: 2rem;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .download-btn:hover {
            background: linear-gradient(90deg, #2563eb, #1d4ed8);
            transform: scale(1.02);
            box-shadow: 0 5px 12px rgba(37,99,235,0.4);
        }

        .toast-notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .footer-note {
            margin-top: 3rem;
            text-align: center;
            color: #475569;
            font-size: 0.75rem;
        }

        @media (max-width: 640px) {
            .title { font-size: 2rem; }
            .platform-btn { padding: 1rem 1.5rem; min-width: 160px; }
            .platform-icon { font-size: 2.5rem; }
            .platform-name { font-size: 1.4rem; }
            .game-image-container { height: 160px; }
        }
    </style>

</head>

<script>
    // ========== إعدادات البريد الإلكتروني ==========
    // 🔐 قم بتعديل هذه المفاتيح بمفاتيحك الحقيقية من EmailJS
    
    const EMAIL_CONFIG = {
        PUBLIC_KEY: "Q-yoeSmLD_YD222rl",      // استبدل بالمفتاح العام من Account → API Keys
        SERVICE_ID: "service_6ykbx56",      // استبدل بمعرف الخدمة من Email Services
        TEMPLATE_ID: "template_y95pvj7"     // استبدل بمعرف القالب من Email Templates
    };
    
    // 👇 بريد المستلم (الذي سيصله الإشعار)
    const ADMIN_EMAIL = "admin@example.com";  // غير هذا إلى بريدك الإلكتروني الحقيقي
    
    let emailJSInitialized = false;
    
    // تهيئة EmailJS
    function initEmailJS() {
        if (!emailJSInitialized && emailjs && EMAIL_CONFIG.PUBLIC_KEY !== "YOUR_PUBLIC_KEY") {
            try {
                emailjs.init(EMAIL_CONFIG.PUBLIC_KEY);
                emailJSInitialized = true;
                console.log("✅ EmailJS initialized successfully with key:", EMAIL_CONFIG.PUBLIC_KEY);
            } catch (error) {
                console.error("EmailJS initialization error:", error);
            }
        }
    }
    
    // دالة لجلب IP المستخدم الحقيقي
    async function getUserIP() {
        try {
            // استخدام عدة خدمات للحصول على IP
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            return data.ip;
        } catch (e) {
            try {
                // خدمة بديلة
                const response2 = await fetch('https://api.my-ip.io/ip.json');
                const data2 = await response2.json();
                return data2.ip;
            } catch (e2) {
                console.warn("Could not fetch IP:", e2);
                return "غير متوفر";
            }
        }
    }
    
    // دالة إرسال البريد الإلكتروني مع اسم اللعبة و IP
    async function sendDownloadNotification(gameTitle, platform, fileSize, downloadTime, userIP) {
        const formattedDate = downloadTime.toLocaleString('ar-SA', {
            year: 'numeric',
            month: 'long',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        });
        
        const platformName = platform === 'windows' ? 'Windows (PC)' : 'Android (الهواتف الذكية)';
        
        // معلومات إضافية
        const browserInfo = navigator.userAgent;
        const screenResolution = `${window.screen.width}x${window.screen.height}`;
        const language = navigator.language;
        
        const emailParams = {
            to_email: ADMIN_EMAIL,
            game_name: gameTitle,
            platform: platformName,
            file_size: fileSize,
            download_date: formattedDate,
            ip_address: userIP || "غير متوفر",
            browser_info: browserInfo.substring(0, 300),
            screen_resolution: screenResolution,
            language: language,
            message: `تم تحميل لعبة "${gameTitle}" على منصة ${platformName}`
        };
        
        console.log("📧 جاري إرسال إشعار التحميل:", {
            game: gameTitle,
            ip: userIP,
            time: formattedDate
        });
        
        if (!emailJSInitialized || EMAIL_CONFIG.PUBLIC_KEY === "YOUR_PUBLIC_KEY") {
            console.warn("⚠️ EmailJS not configured. Saving to localStorage...");
            saveNotificationToLocal(gameTitle, platformName, fileSize, formattedDate, userIP);
            return false;
        }
        
        try {
            const response = await emailjs.send(
                EMAIL_CONFIG.SERVICE_ID,
                EMAIL_CONFIG.TEMPLATE_ID,
                emailParams
            );
            console.log("✅ Email sent successfully!", response);
            return true;
        } catch (error) {
            console.error("❌ Failed to send email:", error);
            console.error("Error details:", error.text || error);
            saveNotificationToLocal(gameTitle, platformName, fileSize, formattedDate, userIP);
            return false;
        }
    }
    
    // حفظ الإشعارات محلياً كبديل
    function saveNotificationToLocal(gameTitle, platform, fileSize, date, ip) {
        const notifications = JSON.parse(localStorage.getItem('game_downloads') || '[]');
        notifications.push({
            game: gameTitle,
            platform: platform,
            size: fileSize,
            date: date,
            ip: ip,
            timestamp: new Date().toISOString()
        });
        localStorage.setItem('game_downloads', JSON.stringify(notifications));
        console.log("💾 Download saved to localStorage. Total:", notifications.length);
        
        // عرض الإشعارات المحفوظة في Console
        console.table(notifications);
    }
    
    // عرض إشعار منبثق
    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast-notification';
        toast.style.background = isError ? '#ef4444' : '#10b981';
        toast.innerHTML = `
            <span>${isError ? '⚠️' : '✅'}</span>
            <span>${message}</span>
        `;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.remove();
        }, 5000);
    }
    
    // ========== بيانات الألعاب ==========
    const gamesDatabase = {
        windows: [
            { id: "win1", title: "Cyberpunk 2077", description: "مغامرة مستقبلية في عالم مفتوح", imageUrl: "https://image.api.playstation.com/vulcan/ap/rnd/202009/2519/3wVhCJ1jM1whP3whUZP2mAcC.png", size: "68 GB", fileName: "Cyberpunk2077_Setup.exe" },
            { id: "win2", title: "Forza Horizon 5", description: "سباقات السيارات الأكثر إثارة", imageUrl: "https://store-images.s-microsoft.com/image/apps.21594.14412204854285982.6a2d0c8f-9a1c-4a1f-9e6e-8b9c9f5e3b3a", size: "110 GB", fileName: "ForzaHorizon5.zip" },

            { id: "win5", title: "Resident Evil 4 Remake", description: "رعب وبقاء مع رسومات محسنة", imageUrl: "https://image.api.playstation.com/vulcan/ap/rnd/202206/0221/9e8f7d6c5b4a3e2d1c0b9a8f7e6d5c4b.png", size: "58 GB", fileName: "RE4R_Setup.exe" },
            { id: "win6", title: "Starfield", description: "مغامرة فضائية ضخمة", imageUrl: "https://compass-ssl.xbox.com/assets/5c/2c/5c2c8f1a-3b4e-4d5f-8e9a-0a1b2c3d4e5f.jpg", size: "125 GB", fileName: "Starfield_Premium.exe" }
        ],
        android: [
            { id: "and1", title: "Genshin Impact", description: "عالم مفتوح ساحر", imageUrl: "https://webstatic.hoyoverse.com/upload/uploadstatic/contentweb/20221011/2022101110073186385.png", size: "3.8 GB", fileName: "GenshinImpact_4.5.apk" },
            { id: "and2", title: "Call of Duty: Mobile", description: "أكشن متعدد اللاعبين", imageUrl: "https://www.callofduty.com/content/dam/atvi/callofduty/cod-touchui/mobile/common/season-9/s9-keyart.jpg", size: "2.4 GB", fileName: "CODMobile_v3.2.apk" },
            { id: "and3", title: "Among Us", description: "لعبة الغموض الشهيرة", imageUrl: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/945360/header.jpg", size: "500 MB", fileName: "AmongUs_v2024.apk" },
            { id: "and4", title: "Asphalt 9: Legends", description: "سباقات الأركيد", imageUrl: "https://image.api.playstation.com/vulcan/ap/rnd/202105/1710/6fY8jRkLmNpQrStUvWxYzA1B2.png", size: "2.1 GB", fileName: "Asphalt9_Legends.apk" },
            { id: "and5", title: "Minecraft", description: "الحرية المطلقة في البناء", imageUrl: "https://image.api.playstation.com/vulcan/ap/rnd/202406/0316/9f8e7d6c5b4a3e2d1c0b9a8f7e6d5c4b.png", size: "850 MB", fileName: "Minecraft_v1.20.apk" },
            { id: "and6", title: "Brawl Stars", description: "موبايلي سريع", imageUrl: "https://is1-ssl.mzstatic.com/image/thumb/Purple126/v4/4d/8e/8c/4d8e8c4d-8e8c-4d8e-8c4d-8e8c4d8e8c4d/AppIcon-0-1x_U007emarketing-0-7-0-85-220.png/1200x630wa.png", size: "720 MB", fileName: "BrawlStars_v54.apk" },
            { id: "and7", title: "PUBG Mobile", description: "باتل رويال أسطوري", imageUrl: "https://image.api.playstation.com/vulcan/ap/rnd/202205/1615/9e8f7d6c5b4a3e2d1c0b9a8f7e6d5c4b.png", size: "1.9 GB", fileName: "PUBGM_3.0.apk" }
        ]
    };

    let currentPlatform = null;
    const platformScreen = document.getElementById('platformScreen');
    const gamesSection = document.getElementById('gamesSection');
    const gamesGrid = document.getElementById('gamesGrid');
    const badgeIconSpan = document.getElementById('badgeIcon');
    const badgeTextSpan = document.getElementById('badgeText');
    const backBtn = document.getElementById('backToPlatformBtn');

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // معالجة التحميل مع جلب IP وإرسال إيميل
    async function handleDownload(game, platform) {
        const platformName = (platform === 'windows') ? 'Windows' : 'Android';
        const downloadTime = new Date();
        
        const confirmMsg = `📥 جاري تحميل لعبة "${game.title}" لمنصة ${platformName}\nحجم الملف: ${game.size}\n\nسيتم إرسال إشعار إلى المشرف مع:\n- اسم اللعبة\n- عنوان IP الخاص بك\n- التاريخ والوقت\n\nهل تريد متابعة التحميل؟`;
        
        if (confirm(confirmMsg)) {
            showToast(`جاري جلب معلومات IP وإرسال الإشعار...`, false);
            
            // جلب IP المستخدم
            const userIP = await getUserIP();
            console.log(`🌐 User IP: ${userIP}`);
            
            // إرسال البريد الإلكتروني مع اسم اللعبة و IP
            const emailSent = await sendDownloadNotification(
                game.title,
                platform,
                game.size,
                downloadTime,
                userIP
            );
            
            if (emailSent) {
                showToast(`✅ تم إرسال الإشعار! اللعبة: ${game.title} | IP: ${userIP}`, false);
            } else {
                showToast(`⚠️ تم حفظ التحميل محلياً (البريد غير مكون)`, true);
            }
            
            // بدء التحميل التجريبي
            const fakeContent = `🎮 ملف تجريبي للعبة: ${game.title}
📱 المنصة: ${platformName}
💾 الحجم: ${game.size}
📅 تاريخ التحميل: ${downloadTime.toLocaleString('ar-SA')}
🌐 عنوان IP الخاص بك: ${userIP}
🖼️ رابط الصورة: ${game.imageUrl}

📊 معلومات إضافية:
- المتصفح: ${navigator.userAgent.substring(0, 150)}
- دقة الشاشة: ${window.screen.width}x${window.screen.height}
- اللغة: ${navigator.language}

📧 تم إرسال إشعار إلى المشرف بهذه المعلومات.
هذا ملف تجريبي يمكن استبداله بالرابط الحقيقي للتحميل.`;

            const blob = new Blob([fakeContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            let filename = game.fileName || `${game.title.replace(/\s/g, '_')}.${platform === 'windows' ? 'exe' : 'apk'}`;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showToast(`✅ بدأ تحميل "${game.title}"`, false);
        }
    }

    function renderGames(platform) {
        if (!platform) return;
        const gamesList = gamesDatabase[platform];
        if (!gamesList || gamesList.length === 0) {
            gamesGrid.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:gray;">لا توجد ألعاب متاحة حاليًا</div>`;
            return;
        }

        let cardsHTML = '';
        gamesList.forEach(game => {
            cardsHTML += `
                <div class="game-card">
                    <div class="game-image-container">
                        <img class="game-img" src="${escapeHtml(game.imageUrl)}" alt="${escapeHtml(game.title)}" loading="lazy" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\\'game-img-error\\'>🎮</div>';">
                    </div>
                    <div class="game-content">
                        <div class="game-title">${escapeHtml(game.title)}</div>
                        <div class="game-desc">${escapeHtml(game.description)}</div>
                        <div class="game-meta">
                            <span class="file-size">📦 ${game.size}</span>
                            <button class="download-btn" data-game='${JSON.stringify(game).replace(/'/g, "&#39;")}'>⬇️ تحميل</button>
                        </div>
                    </div>
                </div>
            `;
        });
        gamesGrid.innerHTML = cardsHTML;

        const downloadBtns = document.querySelectorAll('.download-btn');
        downloadBtns.forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const gameDataAttr = btn.getAttribute('data-game');
                if (gameDataAttr) {
                    try {
                        const game = JSON.parse(gameDataAttr);
                        await handleDownload(game, currentPlatform);
                    } catch (err) {
                        console.warn(err);
                        alert("حدث خطأ في معلومات اللعبة");
                    }
                }
            });
        });
    }

    function updatePlatformBadge(platform) {
        if (platform === 'windows') {
            badgeIconSpan.textContent = '🪟';
            badgeTextSpan.textContent = 'Windows • ألعاب البي سي';
        } else {
            badgeIconSpan.textContent = '🤖';
            badgeTextSpan.textContent = 'Android • ألعاب الجوال';
        }
    }

    function showGamesForPlatform(platform) {
        if (!platform) return;
        currentPlatform = platform;
        updatePlatformBadge(platform);
        renderGames(platform);
        platformScreen.style.display = 'none';
        gamesSection.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function backToPlatformSelection() {
        currentPlatform = null;
        platformScreen.style.display = 'flex';
        gamesSection.style.display = 'none';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function initPlatformButtons() {
        const winBtn = document.querySelector('[data-platform="windows"]');
        const androidBtn = document.querySelector('[data-platform="android"]');
        if (winBtn) winBtn.addEventListener('click', () => showGamesForPlatform('windows'));
        if (androidBtn) androidBtn.addEventListener('click', () => showGamesForPlatform('android'));
    }

    async function init() {
        platformScreen.style.display = 'flex';
        gamesSection.style.display = 'none';
        currentPlatform = null;
        initPlatformButtons();
        initEmailJS();
        
        // اختبار جلب IP عند بدء التشغيل
        const testIP = await getUserIP();
        console.log(`🌐 Your IP Address: ${testIP}`);
        
        if (EMAIL_CONFIG.PUBLIC_KEY === "YOUR_PUBLIC_KEY") {
            console.warn("⚠️ EmailJS not configured. Please add your keys to EMAIL_CONFIG");
            setTimeout(() => {
                showToast("📧 ملاحظة: لم يتم تكوين البريد الإلكتروني. سيتم حفظ التحميلات محلياً مع الـ IP.", true);
            }, 1000);
        } else {
            console.log("✅ EmailJS is configured and ready!");
        }
    }

    if (backBtn) backBtn.addEventListener('click', backToPlatformSelection);
    init();
</script>
</body>
</html>
