<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>مركز تحميل الألعاب | ويندوز و أندرويد</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tahoma', 'Cairo', system-ui, -apple-system, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0f1e 0%, #0f172a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            position: relative;
        }

        /* Background animated effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(59,130,246,0.15) 0%, rgba(0,0,0,0) 60%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 1300px;
            z-index: 2;
            position: relative;
        }

        /* Card style common */
        .glass-card {
            background: rgba(15, 25, 45, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.5);
            transition: transform 0.2s ease, box-shadow 0.2s;
        }

        /* Platform selection screen */
        .platform-screen {
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .title {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #3b82f6, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1.2rem;
            margin-bottom: 3rem;
            max-width: 600px;
        }

        .platform-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            margin-top: 1rem;
        }

        .platform-btn {
            background: rgba(20, 30, 55, 0.9);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.25);
            padding: 1.5rem 3rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            min-width: 220px;
        }

        .platform-btn:hover {
            transform: translateY(-8px);
            background: rgba(59,130,246,0.25);
            border-color: #3b82f6;
            box-shadow: 0 20px 30px -12px rgba(59,130,246,0.3);
        }

        .platform-icon {
            font-size: 3.5rem;
            display: block;
            margin-bottom: 0.75rem;
        }

        .platform-name {
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
        }

        .platform-desc {
            font-size: 0.9rem;
            color: #9ca3af;
            margin-top: 0.5rem;
        }

        /* Games Grid (Cards) */
        .games-section {
            display: none;
            animation: fadeInUp 0.4s ease-out;
        }

        .games-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            background: rgba(0,0,0,0.4);
            padding: 1rem 1.8rem;
            border-radius: 2rem;
            backdrop-filter: blur(4px);
        }

        .platform-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #1e293b;
            padding: 0.6rem 1.4rem;
            border-radius: 3rem;
        }

        .badge-icon {
            font-size: 1.8rem;
        }

        .badge-text {
            font-size: 1.4rem;
            font-weight: bold;
            color: white;
        }

        .back-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 0.7rem 1.5rem;
            border-radius: 2rem;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(4px);
        }

        .back-btn:hover {
            background: rgba(239,68,68,0.7);
            transform: scale(0.97);
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem;
            margin-top: 1rem;
        }

        .game-card {
            background: rgba(20, 30, 48, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            overflow: hidden;
            transition: all 0.25s ease;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
        }

        .game-card:hover {
            transform: translateY(-6px);
            border-color: rgba(59,130,246,0.5);
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.5);
        }

        .game-img {
            height: 160px;
            background: linear-gradient(145deg, #1e2a3a, #0f172a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            position: relative;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .game-content {
            padding: 1.2rem 1.2rem 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .game-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 0.5rem;
        }

        .game-desc {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        .game-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            gap: 10px;
            flex-wrap: wrap;
        }

        .file-size {
            background: #0f172a;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #cbd5e1;
        }

        .download-btn {
            background: linear-gradient(90deg, #3b82f6, #2563eb);
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }

        .download-btn:hover {
            background: linear-gradient(90deg, #2563eb, #1d4ed8);
            transform: scale(1.02);
            box-shadow: 0 5px 12px rgba(37,99,235,0.4);
        }

        /* Footer */
        .footer-note {
            margin-top: 3rem;
            text-align: center;
            color: #475569;
            font-size: 0.75rem;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 640px) {
            .title { font-size: 2rem; }
            .platform-btn { padding: 1rem 1.5rem; min-width: 160px; }
            .platform-icon { font-size: 2.5rem; }
            .platform-name { font-size: 1.4rem; }
            .games-grid { gap: 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- اختيار المنصة: Windows / Android -->
    <div id="platformScreen" class="glass-card platform-screen">
        <div>
            <h1 class="title">🎮 مكتبة الألعاب</h1>
            <p class="subtitle">اختر منصتك لتبدأ رحلة التحميل</p>
            <div class="platform-buttons">
                <div class="platform-btn" data-platform="windows">
                    <span class="platform-icon">🪟</span>
                    <div class="platform-name">Windows</div>
                    <div class="platform-desc">PC - ألعاب ويندوز</div>
                </div>
                <div class="platform-btn" data-platform="android">
                    <span class="platform-icon">🤖</span>
                    <div class="platform-name">Android</div>
                    <div class="platform-desc">هواتف و تابلت</div>
                </div>
            </div>
        </div>
    </div>

    <!-- قسم عرض البطاقات (يظهر بعد الاختيار) -->
    <div id="gamesSection" class="games-section">
        <div class="games-header">
            <div class="platform-badge" id="platformBadge">
                <span class="badge-icon" id="badgeIcon">🪟</span>
                <span class="badge-text" id="badgeText">Windows</span>
            </div>
            <button class="back-btn" id="backToPlatformBtn">↺ تغيير المنصة</button>
        </div>
        <div class="games-grid" id="gamesGrid">
            <!-- سيتم ملء البطاقات بواسطة JS -->
        </div>
        <div class="footer-note">
            ⚡ جميع الروابط تجريبية للأغراض التعليمية | اضغط تحميل للمحاكاة
        </div>
    </div>
</div>

<script>
    // بيانات الألعاب الخاصة بكل منصة (Windows + Android)
    const gamesDatabase = {
        windows: [
            {
                id: "win1",
                title: "Cyberpunk 2077",
                description: "مغامرة مستقبلية في عالم مفتوح، رسومات مبهرة وقصة ملحمية.",
                icon: "🌃",
                size: "68 GB",
                downloadLink: "#",
                fileName: "Cyberpunk2077_Setup.exe"
            },
            {
                id: "win2",
                title: "Forza Horizon 5",
                description: "سباقات السيارات الأكثر إثارة مع مناظر مكسيكية خلابة.",
                icon: "🏎️",
                size: "110 GB",
                downloadLink: "#",
                fileName: "ForzaHorizon5.zip"
            },
            {
                id: "win3",
                title: "Elden Ring",
                description: "لعبة الأكشن والفانتازيا من فئة الجوائز العالمية.",
                icon: "⚔️",
                size: "49 GB",
                downloadLink: "#",
                fileName: "EldenRing_Setup.exe"
            },
            {
                id: "win4",
                title: "Hogwarts Legacy",
                description: "عالم هاري بوتر السحري، استكشف قلعة هوغووتس.",
                icon: "🪄",
                size: "73 GB",
                downloadLink: "#",
                fileName: "HogwartsLegacy.iso"
            },
            {
                id: "win5",
                title: "Resident Evil 4 Remake",
                description: "رعب وبقاء مع رسومات محسنة وأجواء مشوقة.",
                icon: "🧟",
                size: "58 GB",
                downloadLink: "#",
                fileName: "RE4R_Setup.exe"
            },
            {
                id: "win6",
                title: "Starfield",
                description: "مغامرة فضائية ضخمة من إنتاج Bethesda.",
                icon: "🚀",
                size: "125 GB",
                downloadLink: "#",
                fileName: "Starfield_Premium.exe"
            }
        ],
        android: [
            {
                id: "and1",
                title: "Genshin Impact",
                description: "عالم مفتوح ساحر، قتال سريع وشخصيات متعددة.",
                icon: "✨",
                size: "3.8 GB",
                downloadLink: "#",
                fileName: "GenshinImpact_4.5.apk"
            },
            {
                id: "and2",
                title: "Call of Duty: Mobile",
                description: "أكشن متعدد اللاعبين، رسومات احترافية وطور الباتل رويال.",
                icon: "🔫",
                size: "2.4 GB",
                downloadLink: "#",
                fileName: "CODMobile_v3.2.apk"
            },
            {
                id: "and3",
                title: "Among Us",
                description: "لعبة الغموض والتواصل الاجتماعي الشهيرة.",
                icon: "👽",
                size: "500 MB",
                downloadLink: "#",
                fileName: "AmongUs_v2024.apk"
            },
            {
                id: "and4",
                title: "Asphalt 9: Legends",
                description: "سباقات الأركيد عالية السرعة بأجواء خيالية.",
                icon: "🏁",
                size: "2.1 GB",
                downloadLink: "#",
                fileName: "Asphalt9_Legends.apk"
            },
            {
                id: "and5",
                title: "Minecraft",
                description: "الحرية المطلقة في البناء والمغامرات.",
                icon: "⛏️",
                size: "850 MB",
                downloadLink: "#",
                fileName: "Minecraft_v1.20.apk"
            },
            {
                id: "and6",
                title: "Brawl Stars",
                description: "موبايلي سريع، معارك 3 ضد 3 وطور فردي.",
                icon: "⭐",
                size: "720 MB",
                downloadLink: "#",
                fileName: "BrawlStars_v54.apk"
            },
            {
                id: "and7",
                title: "PUBG Mobile",
                description: "باتل رويال أسطوري مع أصدقائك.",
                icon: "🪂",
                size: "1.9 GB",
                downloadLink: "#",
                fileName: "PUBGM_3.0.apk"
            }
        ]
    };

    // متغيرات الحالة
    let currentPlatform = null;   // 'windows' or 'android'

    // عناصر DOM
    const platformScreen = document.getElementById('platformScreen');
    const gamesSection = document.getElementById('gamesSection');
    const gamesGrid = document.getElementById('gamesGrid');
    const badgeIconSpan = document.getElementById('badgeIcon');
    const badgeTextSpan = document.getElementById('badgeText');
    const backBtn = document.getElementById('backToPlatformBtn');

    // وظيفة لعرض بطاقات الألعاب بناءً على المنصة
    function renderGames(platform) {
        if (!platform) return;
        const gamesList = gamesDatabase[platform];
        if (!gamesList || gamesList.length === 0) {
            gamesGrid.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:gray;">لا توجد ألعاب متاحة حاليًا لهذه المنصة 🎮</div>`;
            return;
        }

        // إنشاء بطاقات HTML
        let cardsHTML = '';
        gamesList.forEach(game => {
            // الرابط المباشر المحاكي: يمكن أن يكون # أو رابط حقيقي، لكننا سنحاكي تحميل بسيط
            // نضيف حدث لتنبيه عند النقر (لأنه تجريبي) ولكن سيتم تنزيل وهمي
            cardsHTML += `
                <div class="game-card">
                    <div class="game-img">
                        ${game.icon}
                    </div>
                    <div class="game-content">
                        <div class="game-title">${escapeHtml(game.title)}</div>
                        <div class="game-desc">${escapeHtml(game.description)}</div>
                        <div class="game-meta">
                            <span class="file-size">📦 ${game.size}</span>
                            <button class="download-btn" data-game='${JSON.stringify(game)}'>
                                ⬇️ تحميل
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });
        gamesGrid.innerHTML = cardsHTML;

        // إضافة مستمعات لأزرار التحميل بعد إضافة العناصر
        const downloadBtns = document.querySelectorAll('.download-btn');
        downloadBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const gameDataAttr = btn.getAttribute('data-game');
                if (gameDataAttr) {
                    try {
                        const game = JSON.parse(gameDataAttr);
                        handleDownload(game, currentPlatform);
                    } catch (err) {
                        console.warn(err);
                        alert("حدث خطأ في معلومات اللعبة");
                    }
                } else {
                    alert("لا يمكن معالجة التحميل حالياً");
                }
            });
        });
    }

    // دالة مساعدة لتجنب XSS
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // معالجة التحميل - محاكاة تحميل أو تنبيه ثم تحويل لرابط تجريبي (مثال)
    function handleDownload(game, platform) {
        // هنا نعرض رسالة محاكاة للتحميل، لكن يمكن عمل رابط تنزيل حقيقي إذا وُجد downloadLink
        // بما أن downloadLink في قاعدة البيانات "#" يمكننا إنشاء رابط وهمي مع اسم الملف.
        let platformName = (platform === 'windows') ? 'Windows' : 'Android';
        let confirmMsg = `📥 جاري تحميل لعبة "${game.title}" لمنصة ${platformName}\nحجم الملف: ${game.size}\n\n(هذه محاكاة للعرض، سيتم بدء التحميل التجريبي)`;
        
        if (confirm(confirmMsg + "\nهل تريد متابعة التحميل؟")) {
            // محاكاة تحميل: إنشاء رابط Blob وهمي وتنزيل ملف txt?  لكن الأفضل إظهار تنبيه مع رابط توضيحي
            // لأن العرض توضيحي، لكن نعطي تجربة تنزيل حقيقية وهمية (ملف نصي يوضح أن الملف تجريبي)
            const fakeContent = `هذا ملف تجريبي للعبة ${game.title} لمنصة ${platformName}\nالملف الأصلي بحجم ${game.size}\nيمكن استبدال هذا الرابط برابط حقيقي في التطبيق الفعلي.`;
            const blob = new Blob([fakeContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            // تسمية الملف: game.fileName موجود في البيانات
            let filename = game.fileName || `${game.title.replace(/\s/g, '_')}.${platform === 'windows' ? 'exe' : 'apk'}`;
            if (!filename.includes('.')) filename += platform === 'windows' ? '.exe' : '.apk';
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            // رسالة نجاح
            setTimeout(() => {
                alert(`✅ بدأ تحميل "${game.title}" بشكل تجريبي.\nملف تجريبي: ${filename}`);
            }, 100);
        } else {
            // إلغاء
        }
    }

    // تحديث الشارة العلوية حسب المنصة
    function updatePlatformBadge(platform) {
        if (platform === 'windows') {
            badgeIconSpan.textContent = '🪟';
            badgeTextSpan.textContent = 'Windows • ألعاب البي سي';
        } else if (platform === 'android') {
            badgeIconSpan.textContent = '🤖';
            badgeTextSpan.textContent = 'Android • ألعاب الجوال';
        }
    }

    // عرض شاشة الألعاب وإخفاء شاشة الاختيار
    function showGamesForPlatform(platform) {
        if (!platform) return;
        currentPlatform = platform;
        // تحديث الشارة
        updatePlatformBadge(platform);
        // عرض البطاقات
        renderGames(platform);
        // إظهار قسم الألعاب وإخفاء شاشة الاختيار
        platformScreen.style.display = 'none';
        gamesSection.style.display = 'block';
        // تمرير ناعم للأعلى
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // العودة إلى شاشة اختيار المنصة
    function backToPlatformSelection() {
        currentPlatform = null;
        platformScreen.style.display = 'flex';  // شاشة البداية
        gamesSection.style.display = 'none';
        // إعادة ضبط أي شيء
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // إضافة الأحداث لأزرار المنصة في الصفحة الرئيسية
    function initPlatformButtons() {
        const winBtn = document.querySelector('[data-platform="windows"]');
        const androidBtn = document.querySelector('[data-platform="android"]');
        if (winBtn) {
            winBtn.addEventListener('click', () => {
                showGamesForPlatform('windows');
            });
        }
        if (androidBtn) {
            androidBtn.addEventListener('click', () => {
                showGamesForPlatform('android');
            });
        }
    }

    // التحقق مما إذا كانت هناك وسائط URL أو حالة محفوظة (يمكن للمستخدم الاحتفاظ بالاختيار عبر local storage اختياري)
    // لكن لا داعي لحفظ الحالة، فقط نضمن أن تبدأ بشاشة الاختيار.
    function resetToPlatformScreen() {
        platformScreen.style.display = 'flex';
        gamesSection.style.display = 'none';
        currentPlatform = null;
    }

    // مستمع زر الرجوع
    if (backBtn) {
        backBtn.addEventListener('click', backToPlatformSelection);
    }

    // بدء التطبيق
    function init() {
        resetToPlatformScreen();
        initPlatformButtons();
    }

    init();
</script>
</body>
</html>
