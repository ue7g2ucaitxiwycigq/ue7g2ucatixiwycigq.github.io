<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد AI المجاني - بدون مفتاح API</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.8em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.2em;
        }

        .chat-container {
            padding: 30px;
            background: #f8fafc;
        }

        .messages {
            min-height: 450px;
            max-height: 550px;
            overflow-y: auto;
            padding: 25px;
            background: white;
            border-radius: 20px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .message {
            margin-bottom: 25px;
            display: flex;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            justify-content: flex-end;
        }

        .assistant-message {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 75%;
            padding: 15px 20px;
            border-radius: 25px;
            font-size: 1rem;
            line-height: 1.6;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .user-message .message-content {
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .assistant-message .message-content {
            background: #f1f5f9;
            color: #0f172a;
            border-bottom-left-radius: 5px;
        }

        .input-area {
            display: flex;
            gap: 12px;
            padding: 20px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        textarea {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            font-size: 1rem;
            font-family: inherit;
            resize: none;
            transition: all 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }

        button {
            padding: 0 35px;
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(37,99,235,0.5);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .model-info {
            padding: 15px 30px;
            background: #f1f5f9;
            border-top: 1px solid #e2e8f0;
            font-size: 0.95em;
            color: #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .model-badge {
            background: #2563eb;
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.9em;
        }

        .clear-btn {
            background: #ef4444;
            padding: 8px 20px;
            border-radius: 50px;
            cursor: pointer;
            border: none;
            color: white;
            font-size: 0.95em;
            transition: all 0.3s;
        }

        .clear-btn:hover {
            background: #dc2626;
            transform: scale(1.05);
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 15px 20px;
            background: #f1f5f9;
            border-radius: 25px;
            width: fit-content;
            border-bottom-left-radius: 5px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #64748b;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 2em; }
            .message-content { max-width: 85%; }
            .input-area { flex-direction: column; }
            button { padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 مساعد AI مجاني</h1>
            <p>بدون مفتاح API • بدون تسجيل • بدون حدود</p>
        </div>

        <div class="chat-container">
            <div class="messages" id="messages">
                <div class="message assistant-message">
                    <div class="message-content">
                        👋 أهلين! أنا مساعدك الذكي المجاني. 
                        <br><br>
                        أقدر أساعدك في:
                        • 📝 كتابة وترجمة المحتوى
                        • 💻 برمجة وتصميم
                        • 📊 تحليل بيانات
                        • 🔍 بحث ومعلومات
                        • 🎓 شرح مواد دراسية
                        <br><br>
                        وش تبغى تسأل؟
                    </div>
                </div>
            </div>

            <div class="input-area">
                <textarea 
                    id="userInput" 
                    placeholder="اكتب سؤالك هنا... (مثلاً: اشرح لي كيف أعمل موقع)" 
                    rows="3"
                ></textarea>
                <button onclick="sendMessage()" id="sendBtn">إرسال</button>
            </div>
        </div>

        <div class="model-info">
            <div class="model-badge">
                🤖 NVIDIA Nemotron-3 / Llama-3 / Mixtral
            </div>
            <div>
                <span style="color: #10b981;">●</span> متصل
            </div>
            <button class="clear-btn" onclick="clearChat()">
                🗑️ مسح المحادثة
            </button>
        </div>
    </div>

    <!-- إضافة Puter.js - لا يحتاج مفتاح API -->
    <script src="https://js.puter.com/v2/"></script>

    <script>
        // عناصر DOM
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // سجل المحادثة
        let conversationHistory = [];

        // نماذج متعددة متاحة
        const models = [
            'gpt-4o-mini',
            'claude-3-haiku',
            'llama-3-70b',
            'mixtral-8x7b'
        ];

        async function sendMessage() {
            const message = userInput.value.trim();
            
            if (!message) return;

            // عرض رسالة المستخدم
            addMessage(message, 'user');
            
            // مسح حقل الإدخال
            userInput.value = '';
            
            // عرض مؤشر الكتابة
            showTypingIndicator();

            try {
                // حفظ رسالة المستخدم
                conversationHistory.push({
                    role: 'user',
                    content: message
                });

                // استخدام Puter.ai - مجاني تماماً
                const response = await puter.ai.chat(message, {
                    model: models[Math.floor(Math.random() * models.length)], // نموذج عشوائي
                    stream: false
                });

                // إخفاء مؤشر الكتابة
                hideTypingIndicator();

                // عرض الرد
                addMessage(response, 'assistant');
                
                // حفظ الرد
                conversationHistory.push({
                    role: 'assistant',
                    content: response
                });

            } catch (error) {
                console.error('خطأ:', error);
                hideTypingIndicator();
                addMessage('❌ عذراً، صار خطأ. حاول مرة ثانية', 'assistant');
            }
        }

        function addMessage(content, role) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role === 'user' ? 'user-message' : 'assistant-message'}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            // معالجة النص
            if (role === 'assistant') {
                // تحسين تنسيق الردود
                content = content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                content = content.replace(/\*(.*?)\*/g, '<em>$1</em>');
                content = content.replace(/\n/g, '<br>');
                contentDiv.innerHTML = content;
            } else {
                contentDiv.textContent = content;
            }
            
            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);
            
            scrollToBottom();
        }

        function showTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant-message';
            typingDiv.id = 'typing-indicator';
            
            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator';
            indicator.innerHTML = `
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            `;
            
            typingDiv.appendChild(indicator);
            messagesDiv.appendChild(typingDiv);
            scrollToBottom();
        }

        function hideTypingIndicator() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }

        function scrollToBottom() {
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function clearChat() {
            if (confirm('مسح كل المحادثة؟')) {
                messagesDiv.innerHTML = '';
                addMessage('👋 مرحباً! أنا مساعدك الذكي المجاني. كيف أقدر أساعدك؟', 'assistant');
                conversationHistory = [];
            }
        }

        // إرسال بالضغط على Enter
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // تحميل تلقائي
        console.log('✅ الموقع جاهز! Puter.js مفعل');
    </script>
</body>
</html>
